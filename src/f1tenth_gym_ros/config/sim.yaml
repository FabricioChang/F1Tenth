bridge:
  ros__parameters:
    ego_namespace: 'ego_racecar'
    ego_scan_topic: 'scan'
    ego_odom_topic: 'odom'
    ego_opp_odom_topic: 'opp_odom'
    ego_drive_topic: 'drive'

    opp_namespace: 'opp_racecar'
    opp_scan_topic: 'opp_scan'
    opp_odom_topic: 'odom'
    opp_ego_odom_topic: 'opp_odom'
    opp_drive_topic: 'opp_drive'

    opp2_namespace: 'opp_racecar_2'
    opp2_scan_topic: 'opp2_scan'
    opp2_odom_topic: 'odom'
    opp2_ego_odom_topic: 'opp2_opp_odom'
    opp2_drive_topic: 'opp2_drive'

    scan_distance_to_base_link: 0.0

    scan_fov: 4.7
    scan_beams: 1080

    map_path: '/home/fabricio/F1Tenth-Repository/src/f1tenth_gym_ros/maps/SaoPaulo_map_obstaculos'
    map_img_ext: '.png'

    # ego + 2 opponents
    num_agent: 3

    # ego starting pose
    sx: 0.0
    sy: 0.0
    stheta: -1.3

    # opponent 1 starting pose
    sx1: 1.0
    sy1: -1.0
    stheta1: -1.3

    # opponent 2 starting pose
    sx2: -0.4
    sy2: -2.0
    stheta2: -1.3

    kb_teleop: True